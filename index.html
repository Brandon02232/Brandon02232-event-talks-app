<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Talks Event</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #f4f4f4;
    color: #333;
}

header {
    background-color: #333;
    color: #fff;
    padding: 1em 0;
    text-align: center;
}

h1, h2 {
    color: #333;
}

main {
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
    background-color: #fff;
    box-shadow: 0 0 10px rgba =rgba(0, 0, 0, 0.1);
}

#search-section {
    margin-bottom: 20px;
    text-align: center;
}

#category-search {
    width: 80%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1em;
}

.talk-block, .break-block {
    background-color: #fff;
    border: 1px solid #ddd;
    border-radius: 5px;
    margin-bottom: 10px;
    padding: 15px;
    display: flex;
    align-items: flex-start;
}

.talk-time {
    font-weight: bold;
    color: #555;
    flex: 0 0 120px; /* Fixed width for time */
    padding-right: 15px;
    border-right: 1px solid #eee;
    text-align: right;
}

.talk-content {
    flex-grow: 1;
    padding-left: 15px;
}

.talk-title {
    font-size: 1.2em;
    color: #0056b3;
    cursor: pointer;
    margin-top: 0;
    margin-bottom: 5px;
}

.talk-speakers {
    font-style: italic;
    color: #666;
    margin-bottom: 5px;
}

.talk-categories {
    font-size: 0.9em;
    color: #888;
    margin-bottom: 10px;
}

.talk-description {
    font-size: 0.9em;
    line-height: 1.5;
    margin-top: 10px;
    border-top: 1px solid #eee;
    padding-top: 10px;
    display: none; /* Hidden by default */
}

.talk-block.expanded .talk-description {
    display: block;
}

.break-block {
    background-color: #e9e9e9;
    font-style: italic;
    color: #555;
}

.break-content {
    font-weight: bold;
    padding-left: 15px;
}

footer {
    text-align: center;
    padding: 1em 0;
    color: #666;
    font-size: 0.9em;
    margin-top: 20px;
}

    </style>
</head>
<body>
    <header>
        <h1>Technical Talks Event</h1>
        <p>A full day of insights and innovation.</p>
    </header>

    <main>
        <section id="search-section">
            <input type="text" id="category-search" placeholder="Search by category...">
        </section>

        <section id="schedule">
            <h2>Event Schedule</h2>
            <!-- Talks will be injected here by JavaScript -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Technical Talks Event</p>
    </footer>

    <script>
        const talks = [
    {
        id: 'talk1',
        title: 'The Future of AI in Software Development',
        speakers: ['Dr. Alice Smith'],
        category: ['AI', 'Software Engineering'],
        duration: 60,
        description: 'Explore how artificial intelligence is reshaping the landscape of software development, from automated code generation to intelligent testing systems.'
    },
    {
        id: 'talk2',
        title: 'Containerization Best Practices with Docker and Kubernetes',
        speakers: ['Bob Johnson', 'Carol White'],
        category: ['DevOps', 'Cloud', 'Containers'],
        duration: 60,
        description: 'Dive deep into effective strategies for containerizing applications and managing them at scale using Docker and Kubernetes.'
    },
    {
        id: 'talk3',
        title: 'Advanced JavaScript: Beyond the Basics',
        speakers: ['David Green'],
        category: ['Web Development', 'JavaScript'],
        duration: 60,
        description: 'Uncover advanced patterns, performance tips, and the latest features in JavaScript to write more efficient and maintainable code.'
    },
    {
        id: 'talk4',
        title: 'Securing Your Applications: A Practical Guide',
        speakers: ['Eve Black'],
        category: ['Security', 'Best Practices'],
        duration: 60,
        description: 'Learn practical techniques and common pitfalls in securing modern web applications, focusing on both front-end and back-end vulnerabilities.'
    },
    {
        id: 'talk5',
        title: 'Building Scalable APIs with Node.js and GraphQL',
        speakers: ['Frank Blue'],
        category: ['Backend', 'Node.js', 'API'],
        duration: 60,
        description: 'Discover how to design and implement highly scalable and efficient APIs using Node.js, Express, and GraphQL.'
    },
    {
        id: 'talk6',
        title: 'User Experience (UX) Design for Developers',
        speakers: ['Grace Purple'],
        category: ['UX', 'Design', 'Frontend'],
        duration: 60,
        description: 'An introduction to fundamental UX principles for developers, helping you build user-friendly interfaces that delight your audience.'
    }
];
        document.addEventListener('DOMContentLoaded', () => {
    const scheduleElement = document.getElementById('schedule');
    const categorySearchInput = document.getElementById('category-search');

    function formatTime(date) {
        return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    }

    function renderSchedule(filteredTalks = talks) {
        scheduleElement.innerHTML = '<h2>Event Schedule</h2>'; // Clear existing schedule

        let currentTime = new Date();
        currentTime.setHours(10, 0, 0, 0); // Event starts at 10:00 AM

        const eventSchedule = [];
        let talkIndex = 0;
        const totalTalks = filteredTalks.length;

        // Determine when to place the lunch break (after 3 talks)
        const lunchAfterTalk = 3;

        for (let i = 0; i < totalTalks + 1; i++) { // +1 for lunch break
            if (i === lunchAfterTalk && totalTalks > 0) {
                // Add lunch break
                const lunchStartTime = new Date(currentTime);
                const lunchEndTime = new Date(lunchStartTime.getTime() + 60 * 60 * 1000);
                eventSchedule.push({
                    type: 'break',
                    title: 'Lunch Break',
                    startTime: formatTime(lunchStartTime),
                    endTime: formatTime(lunchEndTime),
                    duration: 60
                });
                currentTime = lunchEndTime;
            }

            if (talkIndex < totalTalks) {
                const talk = filteredTalks[talkIndex];
                const talkStartTime = new Date(currentTime);
                const talkEndTime = new Date(talkStartTime.getTime() + talk.duration * 60 * 1000);

                eventSchedule.push({
                    type: 'talk',
                    ...talk,
                    startTime: formatTime(talkStartTime),
                    endTime: formatTime(talkEndTime)
                });
                currentTime = talkEndTime;

                talkIndex++;

                // Add 10-minute transition, except after the last talk
                if (talkIndex < totalTalks || (i === lunchAfterTalk -1 && totalTalks > lunchAfterTalk)) { // if we are not at the end of the talks or just before lunch.
                    const transitionStartTime = new Date(currentTime);
                    const transitionEndTime = new Date(transitionStartTime.getTime() + 10 * 60 * 1000);
                    eventSchedule.push({
                        type: 'break',
                        title: 'Transition',
                        startTime: formatTime(transitionStartTime),
                        endTime: formatTime(transitionEndTime),
                        duration: 10
                    });
                    currentTime = transitionEndTime;
                }
            }
        }

        eventSchedule.forEach(item => {
            if (item.type === 'talk') {
                const talkDiv = document.createElement('div');
                talkDiv.classList.add('talk-block');
                talkDiv.innerHTML = `
                    <div class="talk-time">${item.startTime} - ${item.endTime}</div>
                    <div class="talk-content">
                        <h3 class="talk-title">${item.title}</h3>
                        <p class="talk-speakers">Speaker(s): ${item.speakers.join(', ')}</p>
                        <p class="talk-categories">Categories: ${item.category.join(', ')}</p>
                        <div class="talk-description">
                            <p>${item.description}</p>
                        </div>
                    </div>
                `;
                talkDiv.querySelector('.talk-title').addEventListener('click', () => {
                    talkDiv.classList.toggle('expanded');
                });
                scheduleElement.appendChild(talkDiv);
            } else if (item.type === 'break') {
                const breakDiv = document.createElement('div');
                breakDiv.classList.add('break-block');
                breakDiv.innerHTML = `
                    <div class="talk-time">${item.startTime} - ${item.endTime}</div>
                    <div class="break-content">${item.title} (${item.duration} min)</div>
                `;
                scheduleElement.appendChild(breakDiv);
            }
        });
    }

    categorySearchInput.addEventListener('input', (event) => {
        const searchTerm = event.target.value.toLowerCase();
        let filteredTalks = talks;
        if (searchTerm) {
            filteredTalks = talks.filter(talk =>
                talk.category.some(cat => cat.toLowerCase().includes(searchTerm))
            );
        }
        renderSchedule(filteredTalks);
    });

    // Initial render
    renderSchedule();
});

    </script>
</body>
</html>
